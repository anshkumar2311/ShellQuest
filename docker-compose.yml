services:
  postgres:
    image: postgres:16-alpine
    container_name: shellquest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shellquest
      POSTGRES_PASSWORD: shellquest
      POSTGRES_DB: shellquest
    ports:
      - "5432:5432"
    volumes:
      - shellquest_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U shellquest -d shellquest" ]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    image: rudr007/shellquest-backend
    build:
      context: ./backend
    container_name: shellquest-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      AI_API_KEY: ${AI_API_KEY}
      AI_PROVIDER: ${AI_PROVIDER}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      PORT: ${PORT}
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./certs:/app/certs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  shellquest_pgdata:
  shellquest_prisma_client:
