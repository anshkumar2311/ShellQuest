version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: shellquest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shellquest
      POSTGRES_PASSWORD: shellquest
      POSTGRES_DB: shellquest
    ports:
      - "5432:5432"
    volumes:
      - shellquest_pgdata:/var/lib/postgresql/data
      # schema.sql runs automatically on first container start (empty data dir)
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shellquest -d shellquest"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: shellquest-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Inside the Docker network, Postgres is reachable by service name
      # "postgres", not "localhost" — this overrides whatever is in .env
      DATABASE_URL: postgresql://shellquest:shellquest@postgres:5432/shellquest
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src
      - shellquest_backend_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  # optional: browser UI to inspect the database at http://localhost:8080
  adminer:
    image: adminer:latest
    container_name: shellquest-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  shellquest_pgdata:
  shellquest_backend_modules:
